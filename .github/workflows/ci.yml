name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          echo "plugin.json is valid JSON"

      - name: Validate required directories
        run: |
          MISSING=0
          for dir in skills commands agents templates schemas; do
            if [ -d "$dir" ]; then
              echo "  found: $dir/"
            else
              echo "  ERROR: required directory '$dir/' not found"
              MISSING=1
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Validate plugin structure and frontmatter
        run: python3 tests/validate.py
